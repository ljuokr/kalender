name: Daten aktualisieren

# Lässt täglich um 05:30 UTC laufen (07:30 CEST / 06:30 CET).
# Zusätzlich manuell auslösbar über den Actions-Tab → "Run workflow".
on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

# Workflow darf in den Default-Branch zurückschreiben
permissions:
  contents: write

# Falls noch ein älterer Lauf aktiv ist: abbrechen
concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v6

      - name: Node einrichten
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Snapshot von PHBern API holen
        run: node build-data.js

      - name: Single-File HTML neu bundlen
        run: node build-bundle.js

      - name: data.js committen + Single-File als Release (nur bei Änderung)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain data.js)" ]; then
            echo "Keine Datenänderung — nichts zu tun."
            exit 0
          fi
          STAND=$(grep -oE 'RAUMDATEN_STAND = "[^"]+"' data.js | head -1 | sed 's/.*"\([^"]*\)"/\1/')
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Daten-Refresh: Stand $STAND (auto)"
          git push
          # Single-File (1.8 MB) NICHT mehr ins Git, sondern als Release-Asset:
          # 'Raumkalender.html' = immer aktuell, datierte Dateien = 14-Tage-Fallback.
          TAG=raumkalender
          DATED="Raumkalender-$(date +%F).html"
          cp Raumkalender.html "$DATED"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Raumkalender (Single-File)" \
              --notes "Automatisch gebaute Einzeldatei fuer den E-Mail-Versand. 'Raumkalender.html' = immer aktuell; datierte Dateien = Fallback der letzten 14 Tage."
          gh release upload "$TAG" Raumkalender.html "$DATED" --clobber
          CUTOFF=$(date -d '14 days ago' +%F)
          gh release view "$TAG" --json assets -q '.assets[].name' \
            | grep -E '^Raumkalender-[0-9]{4}-[0-9]{2}-[0-9]{2}\.html$' \
            | while read -r A; do
                D=$(echo "$A" | sed -E 's/Raumkalender-([0-9-]+)\.html/\1/')
                if [ "$D" \< "$CUTOFF" ]; then
                  echo "Loesche altes Asset: $A"
                  gh release delete-asset "$TAG" "$A" -y
                fi
              done
